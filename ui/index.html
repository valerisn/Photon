<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Screenshot Helper</title>

    <style type="text/css">
      * {
        background-color: transparent;
      }

      #app {
        display: none;
      }

      #command-ui {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.75);
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: sans-serif;
      }

      #command-ui.open {
        display: flex;
      }

      .command-panel {
        background: #1a1a2e;
        border: 1px solid #16213e;
        border-radius: 8px;
        padding: 24px;
        width: 400px;
        color: #e0e0e0;
        box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      }

      .command-panel h2 {
        margin: 0 0 16px 0;
        font-size: 20px;
        color: #ffffff;
      }

      .command-panel label {
        display: block;
        margin: 8px 0 4px;
        font-size: 13px;
        color: #aaaaaa;
      }

      .command-panel input,
      .command-panel select {
        width: 100%;
        padding: 8px 10px;
        background: #0f3460;
        border: 1px solid #16213e;
        border-radius: 4px;
        color: #ffffff;
        font-size: 14px;
        box-sizing: border-box;
      }

      .command-panel input:focus,
      .command-panel select:focus {
        outline: none;
        border-color: #e94560;
      }

      .command-row {
        display: flex;
        gap: 12px;
      }

      .command-row > * {
        flex: 1;
      }

      .command-actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }

      .command-actions button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
      }

      .btn-capture {
        background: #e94560;
        color: #ffffff;
      }

      .btn-capture:hover {
        background: #c73650;
      }

      .btn-close {
        background: #333;
        color: #aaaaaa;
      }

      .btn-close:hover {
        background: #444;
      }

      .command-result {
        margin-top: 12px;
        padding: 10px;
        background: #0f3460;
        border-radius: 4px;
        font-size: 12px;
        word-break: break-all;
        max-height: 200px;
        overflow-y: auto;
      }

      .command-result img {
        max-width: 100%;
        border-radius: 4px;
        margin-top: 8px;
      }

      .command-status {
        margin-top: 8px;
        font-size: 12px;
      }

      .command-status.error {
        color: #e94560;
      }

      .command-status.success {
        color: #4ecca3;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="command-ui">
      <div class="command-panel">
        <h2>Screenshot</h2>

        <label>Target Player</label>
        <input type="text" id="cmd-player" placeholder="Leave blank for self" />

        <div class="command-row">
          <div>
            <label>Encoding</label>
            <select id="cmd-encoding">
              <option value="jpg">JPEG</option>
              <option value="png">PNG</option>
              <option value="webp">WebP</option>
            </select>
          </div>
          <div>
            <label>Quality</label>
            <input type="number" id="cmd-quality" value="0.92" min="0" max="1" step="0.01" />
          </div>
        </div>

        <label>Overlay Text</label>
        <input type="text" id="cmd-overlay" placeholder="Optional overlay text" />

        <div class="command-row">
          <div>
            <label>Overlay Position</label>
            <select id="cmd-position">
              <option value="bottom-left">Bottom Left</option>
              <option value="bottom-right">Bottom Right</option>
              <option value="top-left">Top Left</option>
              <option value="top-right">Top Right</option>
              <option value="center">Center</option>
            </select>
          </div>
          <div>
            <label>Width</label>
            <input type="number" id="cmd-width" placeholder="Auto" min="1" />
          </div>
        </div>

        <div class="command-row">
          <div>
            <label>Height</label>
            <input type="number" id="cmd-height" placeholder="Auto" min="1" />
          </div>
          <div>
            <label>Send to Discord</label>
            <input type="checkbox" id="cmd-discord" style="width:auto;margin-top:12px" />
          </div>
        </div>

        <div class="command-actions">
          <button class="btn-capture" id="cmd-capture">Capture</button>
          <button class="btn-close" id="cmd-close">Close</button>
        </div>

        <div class="command-result" id="cmd-result" style="display:none"></div>
        <div class="command-status" id="cmd-status"></div>
      </div>
    </div>
  </body>
</html>
